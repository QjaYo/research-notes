---
layout: default
---

<article class="post">
  <p class="back-link"><a href="{{ '/' | relative_url }}">Research Notes</a></p>
  <h1>{{ page.title }}</h1>
  <p class="post-description">{{ page.description }}</p>
  <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b. %-d, %Y" }}</time>
  <div class="post-content">
    {{ content }}
  </div>
</article>
